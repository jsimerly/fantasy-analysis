[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Keep pytest out of the virtualenvs and data dirs (they contain unrelated *.py)
norecursedirs = .venv */.venv analysis .git __pycache__ *.egg-info data_engineering/*/sleeper_ingestion.egg-info
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
